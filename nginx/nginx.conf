events {}

http {
  # redirect http → https
  server {
    listen 80;
    server_name pamancloud.site api.pamancloud.site;

    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name pamancloud.site api.pamancloud.site;

    ssl_certificate /etc/letsencrypt/live/pamancloud.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pamancloud.site/privkey.pem;

    location /api/auth/ {
      proxy_pass http://auth-service:4001/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/app/ {
      proxy_pass http://app-service:4002;

      # 🔥 FIX CORS DI NGINX
      add_header 'Access-Control-Allow-Origin' '*' always;
      add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
      add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

    # 🔥 HANDLE PREFLIGHT
    if ($request_method = OPTIONS) {
      return 204;
    }
  }

    location /api/ai/ {
      proxy_pass http://ai-service:4003/;
    }

    location / {
      proxy_pass http://frontend:3000/;
    }
  }
}